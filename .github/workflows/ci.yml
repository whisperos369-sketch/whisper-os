name: CI

on:
  push:
    branches: [ops/windows-phase2c]
  pull_request:
    branches: [dev]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: constraints.txt
      - name: Preflight
        run: pwsh windows/preflight.ps1
      - name: Install
        run: pwsh windows/install.ps1
      - name: Run unit tests
        run: .\.venv\Scripts\python -m pytest -q
      - name: Build UI
        run: pnpm build
